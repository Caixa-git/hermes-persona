<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="480" fill="url(#bg)" rx="8"/>
  <!-- Window chrome -->
  <rect x="30" y="30" width="740" height="420" fill="#1c1c30" rx="8"/>
  <!-- Title bar -->
  <rect x="30" y="30" width="740" height="36" fill="#252540" rx="8"/>
  <rect x="30" y="52" width="740" height="14" fill="#252540"/>
  <!-- Dots -->
  <circle cx="52" cy="48" r="6" fill="#ff5f57"/>
  <circle cx="72" cy="48" r="6" fill="#ffbd2e"/>
  <circle cx="92" cy="48" r="6" fill="#28c840"/>
  <!-- Title -->
  <text x="400" y="54" text-anchor="middle" fill="#888" font-family="SF Mono, monospace" font-size="13">kanban — persona adoption</text>
  <!-- Terminal lines -->
  <!-- Line 1: command -->
  <text x="50" y="100" fill="#6366f1" font-family="SF Mono, monospace" font-size="14" font-weight="bold">$</text>
  <text x="68" y="100" fill="#c0caf5" font-family="SF Mono, monospace" font-size="14">hermes kanban dispatch</text>
  <!-- Line 2: output -->
  <text x="50" y="128" fill="#565f89" font-family="SF Mono, monospace" font-size="13">Spawning persona-worker for t_1a2b3c...</text>
  <!-- Line 3: heartbeat -->
  <text x="50" y="156" fill="#8b5cf6" font-family="SF Mono, monospace" font-size="13">🎭</text>
  <text x="72" y="156" fill="#bb9af7" font-family="SF Mono, monospace" font-size="13">Role adopted:</text>
  <text x="192" y="156" fill="#7dcfff" font-family="SF Mono, monospace" font-size="13" font-weight="bold">🔒 Security Engineer</text>
  <!-- Line 4 -->
  <text x="50" y="184" fill="#565f89" font-family="SF Mono, monospace" font-size="13">Confidence: 87% (4 principles matched)</text>
  <!-- Line 5 -->
  <text x="50" y="212" fill="#565f89" font-family="SF Mono, monospace" font-size="13">Anima profile: hermes-anima (always-on)</text>
  <!-- Separator -->
  <line x1="50" y1="235" x2="750" y2="235" stroke="#2f2f4a" stroke-width="1"/>
  <!-- Second example -->
  <text x="50" y="265" fill="#6366f1" font-family="SF Mono, monospace" font-size="14" font-weight="bold">$</text>
  <text x="68" y="265" fill="#c0caf5" font-family="SF Mono, monospace" font-size="14">hermes kanban create 'Design payment flow' --skill persona</text>
  <!-- Line break visual -->
  <text x="50" y="293" fill="#565f89" font-family="SF Mono, monospace" font-size="13">Assigned to persona-worker. Dispatching...</text>
  <text x="50" y="321" fill="#8b5cf6" font-family="SF Mono, monospace" font-size="13">🎭</text>
  <text x="72" y="321" fill="#bb9af7" font-family="SF Mono, monospace" font-size="13">Role adopted:</text>
  <text x="192" y="321" fill="#f7768e" font-family="SF Mono, monospace" font-size="13" font-weight="bold">🏗️ Backend Architect</text>
  <!-- Confidence bars -->
  <!-- bar bg -->
  <rect x="50" y="345" width="200" height="6" fill="#2f2f4a" rx="3"/>
  <!-- bar fill -->
  <rect x="50" y="345" width="174" height="6" fill="url(#accent)" rx="3"/>
  <text x="260" y="352" fill="#565f89" font-family="SF Mono, monospace" font-size="11">87% confidence</text>
  <!-- Footer -->
  <text x="400" y="430" text-anchor="middle" fill="#3b3b5c" font-family="SF Mono, monospace" font-size="11">source: agency-agents (172 roles · 15 categories)</text>
</svg>
