name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run tests
        run: python3 test_benchmark.py

  reference-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify all 12 reference docs
        run: |
          for f in benchmark-methodology chain-propagation-test \
                   dispatcher-worker-architecture docker-smoke-test \
                   external-system-integration-review kanban-dispatch-setup \
                   kanban-guidance-patch korean-usage-patterns \
                   matching-improvement-research multi-agent-cross-validation \
                   role-url-patterns security-audit-methodology; do
            path="skills/persona/references/${f}.md"
            if [ ! -f "$path" ]; then
              echo "Missing: $path"; exit 1
            fi
            echo "OK $path"
          done

  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash -n install.sh
