name: SBOM Generation

on:
  push:
    branches: [main]
    paths:
      - 'install.sh'
      - 'skills/**'
      - 'test_benchmark.py'
      - 'scripts/**'
      - '.github/workflows/sbom.yml'
  workflow_dispatch:  # manual trigger

permissions:
  contents: write

jobs:
  generate-sbom:
    name: Generate CycloneDX SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate SBOM
        run: python3 scripts/generate-sbom.py

      - name: Generate SHA256 checksum
        run: sha256sum install.sh > install.sh.sha256

      - name: Commit SBOM + checksum if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if ! git diff --quiet sbom.cdx.json install.sh.sha256; then
            git add sbom.cdx.json install.sh.sha256
            git commit -m "chore: auto-update SBOM and install.sh checksum

          Generated by scripts/generate-sbom.py on push to main."
            git push
          else
            echo "No changes to SBOM or checksum — skipping commit"
          fi
